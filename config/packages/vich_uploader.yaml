vich_uploader:
    db_driver: orm

    mappings:
        articles:
            uri_prefix: /images/articles
            upload_destination: '%kernel.project_dir%/public/images/articles'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        repas:
            uri_prefix: /images/repas
            upload_destination: '%kernel.project_dir%/public/images/repas'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        bannieres:
            uri_prefix: /images/banniere
            upload_destination: '%kernel.project_dir%/public/images/banniere'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        sections:
            uri_prefix: /images/sections
            upload_destination: '%kernel.project_dir%/public/images/sections'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true

        candidatures:
            uri_prefix: /candidatures/justificatifs
            upload_destination: '%kernel.project_dir%/public/candidatures/justificatifs'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
